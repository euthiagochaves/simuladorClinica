<div class="formulario-page">
  <div class="formulario-page__header">
    <h1 class="formulario-page__titulo">{{ modoEdicao ? 'Editar Hallazgo' : 'Nuevo Hallazgo' }}</h1>
    <a routerLink="/admin/achados" class="btn btn--secondary">← Volver</a>
  </div>
  @if (erro()) { <div class="alerta alerta--erro">{{ erro() }}</div> }
  <div class="formulario-page__corpo">
    <div class="form-campo">
      <label>Nombre del Hallazgo *</label>
      <input type="text" [value]="nomeAchado()" (input)="nomeAchado.set($any($event.target).value)" placeholder="ej: Auscultación cardíaca" />
    </div>
    <div class="form-campo">
      <label>Sistema / Categoría *</label>
      <select [value]="sistemaCategoria()" (change)="sistemaCategoria.set($any($event.target).value)">
        <option value="">Seleccione un sistema...</option>
        @for (s of sistemas; track s) { <option [value]="s">{{ s }}</option> }
      </select>
    </div>
    <div class="form-campo form-campo--checkbox">
      <input type="checkbox" id="ativo" [checked]="ativo()" (change)="ativo.set($any($event.target).checked)" />
      <label for="ativo">Hallazgo activo</label>
    </div>
    <div class="form-acoes">
      <button class="btn btn--primary" (click)="salvar()" [disabled]="salvando()">{{ salvando() ? 'Guardando...' : 'Guardar' }}</button>
      <a routerLink="/admin/achados" class="btn btn--secondary">Cancelar</a>
    </div>
  </div>
</div>
